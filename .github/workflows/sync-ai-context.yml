name: Sync AI Context

on:
  push:
    branches: ["**"]
    paths:
      - 'README.md'
  pull_request:
    paths:
      - 'README.md'

jobs:
  sync-ai-context:
    name: Sync AI_AGENT_CONTEXT.md from README.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run sync script
        run: python scripts/sync_ai_context.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet AI_AGENT_CONTEXT.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ AI_AGENT_CONTEXT.md is already in sync"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "⚠️ AI_AGENT_CONTEXT.md needs to be updated"
          fi
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add AI_AGENT_CONTEXT.md
          git commit -m "Auto-sync: Update AI_AGENT_CONTEXT.md from README.md"
          git push
      
      - name: Fail PR if out of sync
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "❌ AI_AGENT_CONTEXT.md is out of sync with README.md"
          echo "Please run: python scripts/sync_ai_context.py"
          echo "Or commit with pre-commit hooks enabled to auto-sync"
          exit 1
