---
# render.yaml — SYSTEM_BOUNDARY_HARDENING_V1
# Deterministic deployment manifest for the RecoBlue project on Render.
# All execution parameters are declared here; no implicit defaults are allowed.
#
# Governance invariants enforced:
#   - deployment_is_deterministic (all services declared; no implicit config)
#   - auto_deploy_enabled: false  (no push-to-deploy; manual trigger only)

services:

  # ---------------------------------------------------------------------------
  # Backend — FastAPI web service
  # ---------------------------------------------------------------------------
  - type: web
    name: backend
    runtime: docker
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_KEY
        sync: false

  # ---------------------------------------------------------------------------
  # Worker — RQ background job processor
  # ---------------------------------------------------------------------------
  - type: worker
    name: worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    startCommand: python -m rq worker --url $REDIS_URL default

# ---------------------------------------------------------------------------
# Databases — audit spine (postgres)
# ---------------------------------------------------------------------------
databases:
  - name: postgres
    plan: starter

envVarGroups: []
